<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiservicios Guido</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#1B5E3B;min-height:100vh}

#splash{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;color:#fff;text-align:center;padding:40px}
#splash h1{font-family:Georgia,serif;font-size:32px;margin-bottom:8px}
#splash p{font-size:15px;opacity:.8;margin-bottom:32px}
.splash-btn{background:#C8922A;color:#fff;border:none;border-radius:30px;
  padding:16px 40px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s}
.splash-btn:hover{background:#B07D20;transform:translateY(-2px)}

/* BOTON ADMIN — icono pequeno esquina superior derecha */
#admin-btn{
  position:fixed;
  top:8px;
  right:10px;
  background:rgba(27,94,59,.85);
  color:#fff;border:none;border-radius:50%;
  width:34px;height:34px;
  font-size:16px;
  cursor:pointer;z-index:99999;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
  transition:all .2s;
}
#admin-btn:hover{background:#C8922A;transform:scale(1.1)}
#admin-btn .tag{display:none}

#frame-container{display:none;position:fixed;inset:0;z-index:100;background:#fff}
#frame-container iframe{width:100%;height:100%;border:none;display:block}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:200000;align-items:center;justify-content:center;padding:16px}
.overlay.on{display:flex}
.modal{background:#fff;border-radius:20px;padding:32px;width:100%;max-width:360px;
  box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center}
.modal h2{font-size:20px;color:#1B5E3B;margin-bottom:6px}
.modal p{font-size:12px;color:#999;margin-bottom:20px}
.area-btns{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.area-btn{padding:14px;border:2px solid #DDD;border-radius:12px;background:#fff;
  font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;color:#333}
.area-btn:hover{border-color:#1B5E3B;background:#E8F5E9;color:#1B5E3B}
.area-btn.selected{border-color:#1B5E3B;background:#1B5E3B;color:#fff}
.pass-field{width:100%;padding:12px 16px;border:1.5px solid #DDD;border-radius:10px;
  font-size:16px;outline:none;margin-bottom:10px;text-align:center;letter-spacing:4px}
.pass-field:focus{border-color:#1B5E3B}
.btn-enter{width:100%;padding:13px;background:#1B5E3B;color:#fff;border:none;
  border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.btn-enter:hover{background:#2E7D52}
.btn-cancel{width:100%;padding:8px;background:none;border:none;
  color:#999;font-size:13px;cursor:pointer;margin-top:6px}
.error-msg{color:#C0392B;font-size:12px;margin-top:6px;display:none}
</style>
</head>
<body>

<div id="splash">
  <div style="font-size:60px;margin-bottom:16px">&#128722;</div>
  <h1>Multiservicios Guido</h1>
  <p>Catalogo de Alimentos &#8212; Envios Cuba</p>
  <button class="splash-btn" onclick="abrirCatalogo()">&#128722; Ver Catalogo</button>
</div>

<!-- BOTON ADMIN — icono pequeno, no tapa nada -->
<button id="admin-btn" onclick="abrirModal()" title="Solo administradores">&#128274;</button>

<div id="frame-container">
  <iframe id="main-frame" src="about:blank"></iframe>
</div>

<div class="overlay" id="modal-lock">
  <div class="modal">
    <div style="font-size:36px;margin-bottom:8px">&#128272;</div>
    <h2>Acceso Restringido</h2>
    <p>&#9888;&#65039; Solo para administradores autorizados</p>
    <div class="area-btns">
      <button class="area-btn" id="btn-pedidos" onclick="selArea('pedidos')">&#128230; Sistema de Pedidos</button>
      <button class="area-btn" id="btn-admin"   onclick="selArea('admin')">&#9881;&#65039; Panel Administrativo</button>
    </div>
    <input class="pass-field" type="password" id="pass-input"
           placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"
           onkeydown="if(event.key==='Enter')entrar()">
    <button class="btn-enter" onclick="entrar()">&#9989; Entrar</button>
    <div class="error-msg" id="error-msg">&#10060; Contrasena incorrecta</div>
    <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

var areaSeleccionada="";

function b64toUTF8(s){
  var bin=atob(s);
  var bytes=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

function abrirCatalogo(){
  document.getElementById('splash').style.display='none';
  document.getElementById('frame-container').style.display='block';
  // srcdoc con UTF-8 correcto
  document.getElementById('main-frame').srcdoc = b64toUTF8(DATA.cat);
}

function abrirModal(){
  areaSeleccionada='';
  document.getElementById('pass-input').value='';
  document.getElementById('error-msg').style.display='none';
  document.querySelectorAll('.area-btn').forEach(function(b){b.classList.remove('selected');});
  document.getElementById('modal-lock').className='overlay on';
  setTimeout(function(){document.getElementById('pass-input').focus();},200);
}

function cerrarModal(){
  document.getElementById('modal-lock').className='overlay';
}

function selArea(area){
  areaSeleccionada=area;
  document.querySelectorAll('.area-btn').forEach(function(b){b.classList.remove('selected');});
  document.getElementById('btn-'+area).classList.add('selected');
  document.getElementById('pass-input').focus();
}

function entrar(){
  if(!areaSeleccionada){
    document.getElementById('error-msg').textContent='Selecciona un area primero';
    document.getElementById('error-msg').style.display='block';
    return;
  }
  var pass=document.getElementById('pass-input').value;
  if(pass===PASS){
    cerrarModal();
    var html=b64toUTF8(areaSeleccionada==='pedidos'?DATA.ped:DATA.adm);
    // Abrir en nueva pestana con UTF-8 correcto
    var win=window.open('','_blank');
    if(win){
      win.document.open('text/html','replace');
      win.document.write('<meta charset="UTF-8">');
      win.document.write(html);
      win.document.close();
    }
  }else{
    document.getElementById('error-msg').textContent='Contrasena incorrecta';
    document.getElementById('error-msg').style.display='block';
    document.getElementById('pass-input').value='';
    document.getElementById('pass-input').focus();
  }
}
</script>
