<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Multiservicios Guido</title>
<style>
:root{--g:#1B5E3B;--g2:#2E7D52;--gold:#C8922A;--red:#C0392B;--cr:#FAF7F2;--lg:#F0EDE8;--gr:#6B6B6B}
*{box-sizing:border-box;margin:0;padding:0;font-family:"Segoe UI",Arial,sans-serif}
body{background:var(--cr)}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1B5E3B,#2E7D52)}
.lbox{background:#fff;border-radius:20px;padding:40px 36px;width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.ico{font-size:52px;margin-bottom:10px}
.lbox h2{color:var(--g);font-size:20px;margin-bottom:4px}
.lbox p{color:var(--gr);font-size:13px;margin-bottom:22px}
.lbox input{width:100%;padding:12px;border:2px solid #DDD;border-radius:10px;font-size:16px;text-align:center;letter-spacing:4px;outline:none;margin-bottom:10px}
.lbox input:focus{border-color:var(--g)}
.lbox button{width:100%;padding:12px;background:var(--g);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.lerr{color:var(--red);font-size:13px;margin-top:8px;min-height:18px}
#panel{display:none}
.bar{background:var(--g);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 10px rgba(0,0,0,.2)}
.bar h1{color:#fff;font-size:16px}
.bar-btns{display:flex;gap:7px}
.bar-btns button{padding:8px 13px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer}
.bexp{background:var(--gold);color:#fff}
.bcl{background:rgba(255,255,255,.2);color:#fff}
.bsal{background:rgba(255,255,255,.15);color:#fff}
.body{padding:18px 22px 80px}
.stats{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.sc{background:#fff;border-radius:12px;padding:14px 18px;flex:1;min-width:100px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.sc .n{font-size:28px;font-weight:800;color:var(--g)}
.sc .l{font-size:12px;color:var(--gr)}
.stit{font-size:15px;font-weight:700;color:var(--g);margin-bottom:10px;padding-bottom:7px;border-bottom:2px solid var(--lg)}
.fcard{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:22px}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.ff{display:flex;flex-direction:column;gap:4px}
.ff label{font-size:11px;font-weight:700;color:var(--g)}
.ff input,.ff select,.ff textarea{padding:9px 11px;border:1.5px solid #DDD;border-radius:8px;font-size:13px;outline:none}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--g)}
.ff textarea{min-height:58px;resize:vertical}
.full{grid-column:1/-1}
.btn-ag{margin-top:10px;padding:11px 22px;background:var(--g);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer}
.prev-img{width:56px;height:56px;object-fit:cover;border-radius:7px;border:2px solid #EEE;display:none;margin-top:5px}
.img-opts{display:flex;gap:6px;margin-bottom:6px}
.img-tab{padding:6px 12px;border:1.5px solid #DDD;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;background:#fff;color:var(--gr)}
.img-tab.on{background:var(--g);color:#fff;border-color:var(--g)}
.img-upload-btn{display:flex;align-items:center;gap:6px;padding:9px 14px;border:2px dashed #CCC;border-radius:8px;font-size:13px;color:var(--gr);cursor:pointer;background:#FAFAFA;transition:border-color .2s}
.img-upload-btn:hover{border-color:var(--g);color:var(--g)}
.img-upload-btn input{display:none}
.sbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.sbar input{flex:1;min-width:160px;padding:9px 14px;border:1.5px solid #DDD;border-radius:30px;font-size:13px;outline:none}
.sbar select{padding:9px 12px;border:1.5px solid #DDD;border-radius:30px;font-size:12px;outline:none}
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07)}
th{background:var(--g);color:#fff;padding:10px 12px;font-size:12px;text-align:left}
td{padding:9px 12px;font-size:13px;border-bottom:1px solid var(--lg);vertical-align:middle}
tr:last-child td{border:none}
tr:hover td{background:#F5F3EE}
.pimg{width:40px;height:40px;object-fit:cover;border-radius:7px;background:#EEE}
.pcat{font-size:11px;padding:3px 8px;border-radius:8px;background:var(--lg);color:var(--gr);font-weight:600}
.ppr{font-weight:700;color:var(--g);font-size:13px}
.pof{color:var(--red);font-size:11px;font-weight:700}
.be{padding:5px 10px;background:var(--gold);color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600}
.bd{padding:5px 10px;background:var(--red);color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;margin-left:4px}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center;padding:14px}
.mbg.on{display:flex}
.mbox{background:#fff;border-radius:16px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.mh{background:var(--g);color:#fff;padding:14px 18px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0}
.mh h3{font-size:16px}
.mh button{background:none;border:none;color:#fff;font-size:26px;cursor:pointer;line-height:1}
.mb{padding:16px 18px;display:flex;flex-direction:column;gap:10px}
.mg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mfoot{padding:12px 18px;border-top:2px solid var(--lg);display:flex;gap:8px;position:sticky;bottom:0;background:#fff;border-radius:0 0 16px 16px}
.bs{flex:1;padding:11px;background:var(--g);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer}
.bc{padding:11px 16px;background:none;border:1.5px solid #DDD;border-radius:9px;font-size:13px;cursor:pointer}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:#1a1a1a;color:#fff;padding:11px 22px;border-radius:30px;font-size:14px;font-weight:600;z-index:999;transition:transform .3s;pointer-events:none}
.toast.on{transform:translateX(-50%) translateY(0)}
@media(max-width:580px){.body{padding:12px 12px 80px}.fgrid{grid-column:1fr}.mg2{grid-template-columns:1fr}.bar h1{font-size:13px}th:nth-child(3),td:nth-child(3){display:none}}
</style>
</head>
<body>

<div id="login">
  <div class="lbox">
    <div class="ico">&#128272;</div>
    <h2>Panel Administrativo</h2>
    <p>Multiservicios Guido</p>
    <input type="password" id="pwd" placeholder="Contrasena" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">Entrar</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<div id="panel">
  <div class="bar">
    <h1>&#9881;&#65039; Administrador del Catalogo</h1>
    <div class="bar-btns">
      <button class="bcl" onclick="camClave()">&#128273; Contrasena</button>
      <button class="bexp" onclick="exportar()">&#11015;&#65039; Exportar</button>
      <button class="bsal" onclick="salir()">Salir</button>
    </div>
  </div>
  <div class="body">
    <div class="stats">
      <div class="sc"><div class="n" id="sT">0</div><div class="l">Productos</div></div>
      <div class="sc"><div class="n" id="sC">0</div><div class="l">Categorias</div></div>
      <div class="sc"><div class="n" id="sO">0</div><div class="l">En oferta</div></div>
    </div>

    <div class="stit">&#10133; Agregar Nuevo Producto</div>
    <div class="fcard">
      <div class="fgrid">
        <div class="ff full"><label>NOMBRE *</label><input id="nn" placeholder="Nombre del producto"></div>
        <div class="ff"><label>CATEGORIA *</label>
          <select id="nc"><option value="">-- Seleccionar --</option>
            <option>Aceites y Grasas</option><option>Carnes y Embutidos</option>
            <option>Cereales y Pastas</option><option>Condimentos</option>
            <option>Lacteos y Huevos</option><option>Pescados y Mariscos</option>
            <option>Postres y Confituras</option>
          </select>
        </div>
        <div class="ff"><label>SKU *</label><input id="ns" placeholder="HB-PROD001"></div>
        <div class="ff"><label>PRECIO ($) *</label><input type="number" id="np" step="0.01" min="0" placeholder="0.00"></div>
        <div class="ff"><label>PRECIO OFERTA ($)</label><input type="number" id="no2" step="0.01" min="0" value="0"></div>
        <div class="ff full">
          <label>IMAGEN DEL PRODUCTO</label>
          <div class="img-opts">
            <button type="button" class="img-tab on" onclick="swTab('n','url')">&#127758; URL</button>
            <button type="button" class="img-tab" onclick="swTab('n','file')">&#128193; Subir archivo</button>
          </div>
          <div id="n-url-sec"><input id="ni" placeholder="https://..." oninput="pv('ni','np2')"></div>
          <div id="n-file-sec" style="display:none">
            <label class="img-upload-btn"><input type="file" id="nf" accept="image/*" onchange="loadFile('nf','np2','ni')">&#128247; Seleccionar foto desde archivo</label>
          </div>
          <img id="np2" class="prev-img">
        </div>
        <div class="ff full"><label>DESCRIPCION</label><textarea id="nd" placeholder="Breve descripcion..."></textarea></div>
      </div>
      <button class="btn-ag" onclick="agregar()">&#10133; Agregar Producto</button>
    </div>

    <div class="stit">&#128230; Lista de Productos</div>
    <div class="sbar">
      <input id="fb" placeholder="Buscar..." oninput="renderT()">
      <select id="fc" onchange="renderT()">
        <option value="">Todas las categorias</option>
        <option>Aceites y Grasas</option><option>Carnes y Embutidos</option>
        <option>Cereales y Pastas</option><option>Condimentos</option>
        <option>Lacteos y Huevos</option><option>Pescados y Mariscos</option>
        <option>Postres y Confituras</option>
      </select>
    </div>
    <div class="twrap">
      <table><thead><tr><th>Foto</th><th>Nombre</th><th>Categoria</th><th>Precio</th><th>Acciones</th></tr></thead>
      <tbody id="tb"></tbody></table>
    </div>
  </div>
</div>

<div class="mbg" id="med">
  <div class="mbox">
    <div class="mh"><h3>&#9999;&#65039; Editar Producto</h3><button onclick="cM()">&#215;</button></div>
    <div class="mb">
      <input type="hidden" id="ei">
      <div class="ff"><label>NOMBRE *</label><input id="en"></div>
      <div class="mg2">
        <div class="ff"><label>CATEGORIA *</label>
          <select id="ec">
            <option>Aceites y Grasas</option><option>Carnes y Embutidos</option>
            <option>Cereales y Pastas</option><option>Condimentos</option>
            <option>Lacteos y Huevos</option><option>Pescados y Mariscos</option>
            <option>Postres y Confituras</option>
          </select>
        </div>
        <div class="ff"><label>SKU</label><input id="es"></div>
        <div class="ff"><label>PRECIO ($) *</label><input type="number" id="ep" step="0.01" min="0"></div>
        <div class="ff"><label>OFERTA ($)</label><input type="number" id="eo" step="0.01" min="0"></div>
      </div>
      <div class="ff">
        <label>IMAGEN DEL PRODUCTO</label>
        <div class="img-opts">
          <button type="button" class="img-tab on" onclick="swTab('e','url')">&#127758; URL</button>
          <button type="button" class="img-tab" onclick="swTab('e','file')">&#128193; Subir archivo</button>
        </div>
        <div id="e-url-sec"><input id="eig" oninput="pv('eig','ep2')"></div>
        <div id="e-file-sec" style="display:none">
          <label class="img-upload-btn"><input type="file" id="ef" accept="image/*" onchange="loadFile('ef','ep2','eig')">&#128247; Seleccionar foto desde archivo</label>
        </div>
        <img id="ep2" class="prev-img" style="display:block">
      </div>
      <div class="ff"><label>DESCRIPCION</label><textarea id="ed"></textarea></div>
    </div>
    <div class="mfoot"><button class="bc" onclick="cM()">Cancelar</button><button class="bs" onclick="guardar()">&#128190; Guardar</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>

function b64d(s){try{return decodeURIComponent(escape(atob(s)));}catch(e){return atob(s);}}
function gPwd(){return localStorage.getItem(PKEY)||DPWD;}
function login(){
  var v=document.getElementById("pwd").value;
  if(v===gPwd()){
    document.getElementById("login").style.display="none";
    document.getElementById("panel").style.display="block";
    P=gP(); renderT(); stats();
  } else {
    document.getElementById("lerr").textContent="Contrasena incorrecta";
    document.getElementById("pwd").value="";
  }
}
function salir(){document.getElementById("login").style.display="flex";document.getElementById("panel").style.display="none";document.getElementById("pwd").value="";document.getElementById("lerr").textContent="";}
function camClave(){
  var n=prompt("Nueva contrasena (min 6 caracteres):");
  if(!n||n.length<6){alert("Muy corta.");return;}
  var c=prompt("Confirma:");
  if(n!==c){alert("No coinciden.");return;}
  localStorage.setItem(PKEY,n);tst("Contrasena actualizada");
}
var API_URL = "https://script.google.com/macros/s/AKfycbzecpULOHhR1sNDgWYyYpcDb327LYNX1kq0bNLmx5R7aHCVEwDwQRXcZgOjc_FxSOj7og/exec";

function apiPost(body){
  return fetch(API_URL, {method:"POST", body:JSON.stringify(body)}).then(function(r){return r.json();});
}

// Cargar productos desde Google Sheets
var P = [];
function cargarProductos(){
  tst("Cargando productos...");
  fetch(API_URL + "?action=listarProductos")
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.productos){
        P = data.productos.map(function(p){
          return {
            id: p.id,
            cat: p.categoria||"",
            emo: p.emoji||"📦",
            nombre: p.nombre||"",
            sku: p.sku||"",
            precio: parseFloat(p.precio_normal)||0,
            oferta: parseFloat(p.precio_oferta)||0,
            img: p.imagen_url||"",
            desc: p.descripcion||""
          };
        });
        renderT();
        tst("✅ " + P.length + " productos cargados desde Google Sheets");
      }
    })
    .catch(function(err){tst("❌ Error: " + err.message);});
}

function gP(){return P;}
function sP(p){P=p;}
function stats(){
  document.getElementById("sT").textContent=P.length;
  document.getElementById("sC").textContent=new Set(P.map(function(x){return x.cat;})).size;
  document.getElementById("sO").textContent=P.filter(function(x){return x.oferta>0;}).length;
}
function renderT(){
  var q=(document.getElementById("fb").value||"").toLowerCase();
  var cat=document.getElementById("fc").value;
  var h="";
  P.forEach(function(p,i){
    if(cat&&p.cat!==cat)return;
    if(q&&!(p.nombre.toLowerCase().includes(q)||(p.sku||"").toLowerCase().includes(q)))return;
    h+="<tr><td><img class='pimg' src='"+p.img+"' onerror=\"this.src=''\"></td>";
    h+="<td><b>"+p.nombre+"</b><br><small style='color:#999'>"+p.sku+"</small></td>";
    h+="<td><span class='pcat'>"+p.cat+"</span></td>";
    h+="<td><div class='ppr'>$"+p.precio.toFixed(2)+"</div>"+(p.oferta>0?"<div class='pof'>Oferta: $"+p.oferta.toFixed(2)+"</div>":"")+"</td>";
    h+="<td><button class='be' onclick='aE("+i+")'>Editar</button> <button class='bd' onclick='del("+i+")'>Eliminar</button></td></tr>";
  });
  document.getElementById("tb").innerHTML=h||"<tr><td colspan='5' style='text-align:center;padding:28px;color:#999'>Sin resultados</td></tr>";
  stats();
}
function pv(a,b){var u=document.getElementById(a).value.trim();var i=document.getElementById(b);i.src=u;i.style.display=u?"block":"none";}
function agregar(){
  var n=document.getElementById("nn").value.trim();
  var c=document.getElementById("nc").value;
  var s=document.getElementById("ns").value.trim();
  var pr=parseFloat(document.getElementById("np").value)||0;
  var of=parseFloat(document.getElementById("no2").value)||0;
  var im=document.getElementById("ni").value.trim();
  var d=document.getElementById("nd").value.trim();
  if(!n||!c||!s||!pr){alert("Completa: Nombre, Categoria, SKU y Precio.");return;}
  tst("Guardando...");
  apiPost({action:"crearProducto", data:{
    categoria:c, emoji:EMO[c]||"📦", nombre:n, sku:s,
    precio_normal:pr, precio_oferta:of, imagen_url:im, descripcion:d, activo:"SI"
  }}).then(function(res){{
    if(res.ok){{
      ["nn","ns","np","ni","nd"].forEach(function(id){{document.getElementById(id).value="";}});
      document.getElementById("no2").value="0";
      document.getElementById("nc").value="";
      document.getElementById("np2").style.display="none";
      cargarProductos();
      tst("✅ Producto agregado: "+n);
    }} else {{ tst("❌ Error: "+(res.error||"desconocido")); }}
  }}).catch(function(err){{tst("❌ "+err.message);}});
}
function aE(i){
  var p=P[i];
  document.getElementById("ei").value=i;document.getElementById("en").value=p.nombre;
  document.getElementById("ec").value=p.cat;document.getElementById("es").value=p.sku;
  document.getElementById("ep").value=p.precio;document.getElementById("eo").value=p.oferta;
  document.getElementById("eig").value=p.img;document.getElementById("ed").value=p.desc;
  var im=document.getElementById("ep2");im.src=p.img;im.style.display=p.img?"block":"none";
  document.getElementById("med").className="mbg on";
}
function guardar(){
  var i=parseInt(document.getElementById("ei").value);
  var c=document.getElementById("ec").value;
  var prod = P[i];
  var data = {
    categoria:c, emoji:EMO[c]||"📦",
    nombre:document.getElementById("en").value.trim(),
    sku:document.getElementById("es").value.trim(),
    precio_normal:parseFloat(document.getElementById("ep").value)||0,
    precio_oferta:parseFloat(document.getElementById("eo").value)||0,
    imagen_url:document.getElementById("eig").value.trim(),
    descripcion:document.getElementById("ed").value.trim()
  };
  tst("Guardando...");
  apiPost({action:"actualizarProducto", id:prod.id, data:data}).then(function(res){
    if(res.ok){ cM(); cargarProductos(); tst("✅ Guardado correctamente"); }
    else { tst("❌ Error: "+(res.error||"desconocido")); }
  }).catch(function(err){ tst("❌ "+err.message); });
}
function del(i){
  if(!confirm("Eliminar: "+P[i].nombre+"?"))return;
  var n=P[i].nombre;
  var id=P[i].id;
  tst("Eliminando...");
  apiPost({action:"eliminarProducto", id:id}).then(function(res){
    if(res.ok){ cargarProductos(); tst("✅ Eliminado: "+n); }
    else { tst("❌ Error: "+(res.error||"desconocido")); }
  }).catch(function(err){ tst("❌ "+err.message); });
}
function cM(){document.getElementById("med").className="mbg";}
function tst(m){var t=document.getElementById("toast");t.textContent=m;t.className="toast on";setTimeout(function(){t.className="toast";},2800);}
function exportar(){
  var ta=b64d(TA_B64);
  var tb=b64d(TB_B64);
  var arr="const PRODUCTOS = [\n";
  P.forEach(function(p){
    arr+="  ["+JSON.stringify(p.cat)+","+JSON.stringify(p.emo)+","+JSON.stringify(p.nombre)+","+JSON.stringify(p.sku)+","+p.precio.toFixed(2)+","+p.oferta.toFixed(2)+","+JSON.stringify(p.img)+","+JSON.stringify(p.desc)+"],\n";
  });
  arr+="]";
  var full=ta.replace("75 productos",P.length+" productos")+arr+tb;
  var b=new Blob([full],{type:"text/html;charset=utf-8"});
  var u=URL.createObjectURL(b);
  var a=document.createElement("a");a.href=u;a.download="catalogo_cuba.html";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
  tst("Catalogo exportado - subelo a Netlify");
}

function swTab(prefix, mode){
  var urlSec = document.getElementById(prefix+"-url-sec");
  var fileSec = document.getElementById(prefix+"-file-sec");
  var tabs = urlSec.parentElement.previousElementSibling.querySelectorAll(".img-tab");
  if(mode==="url"){
    urlSec.style.display=""; fileSec.style.display="none";
    tabs[0].className="img-tab on"; tabs[1].className="img-tab";
  } else {
    urlSec.style.display="none"; fileSec.style.display="";
    tabs[0].className="img-tab"; tabs[1].className="img-tab on";
  }
}
function loadFile(inputId, previewId, urlInputId){
  var file = document.getElementById(inputId).files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    var b64 = e.target.result;
    document.getElementById(previewId).src = b64;
    document.getElementById(previewId).style.display = "block";
    document.getElementById(urlInputId).value = b64;
  };
  reader.readAsDataURL(file);
}
</script>
